<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <div class="login-container">
        <form>
            <div class="input-group">
                <label for="email">EMAIL</label>
                <input type="email" id="email" required>
            </div>

            <div class="input-group">
                <label for="senha">SENHA</label>
                <input type="password" id="senha" required>
            </div>

            <button type="submit" class="btn-acessar">ACESSAR</button>
        </form>

        <p class="cadastro-text">
            CASO NÃO TENHA UM CADASTRO <a href="#">CLIQUE AQUI</a>
        </p>
    </div>

    <div class="ilustracao">
        <img src="https://illustrations.popsy.co/pastel/secure-login.svg" alt="Ilustração de login">
    </div>

</body>
</html>
