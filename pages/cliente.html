<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro do Cliente</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/cliente.css">
</head>
<body>

    <div class="cliente-container">
        <h2 class="titulo-pagina">CADASTRO DO CLIENTE</h2>

        <form class="formulario-cliente">
            <div class="input-group">
                <label for="nome-empresa">NOME DA EMPRESA</label>
                <input type="text" id="nome-empresa" required>
            </div>

            <div class="input-group">
                <label for="numero-contato">NÚMERO DO CONTATO</label>
                <input type="tel" id="numero-contato" placeholder="(00) 00000-0000" required>
            </div>

            <div class="input-group">
                <label for="nome-contato">NOME DO CONTATO</label>
                <input type="text" id="nome-contato" required>
            </div>

            <button type="submit" class="btn-salvar">SALVAR VENDA</button>
        </form>
    </div>

</body>
</html>
