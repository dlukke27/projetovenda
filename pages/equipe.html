<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro da Equipe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/equipe.css">
</head>
<body>

    <div class="equipe-container">
        <h2 class="titulo-pagina">CADASTRO DA EQUIPE</h2>

        <form class="formulario-equipe">
            <div class="input-group">
                <label for="nome-equipe">NOME DA EQUIPE</label>
                <input type="text" id="nome-equipe" required>
            </div>

            <div class="input-group">
                <label for="nome-regiao">NOME DA REGIÃO</label>
                <input type="text" id="nome-regiao" required>
            </div>

            <button type="submit" class="btn-salvar">SALVAR EQUIPE</button>
        </form>
    </div>

</body>
</html>
